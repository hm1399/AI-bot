name: ai_bot_app
description: AI-Bot Desktop Assistant Companion App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Networking
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  connectivity_plus: ^5.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  lottie: ^2.6.0
  cached_network_image: ^3.3.0
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.1.14
  permission_handler: ^11.0.1
  image_picker: ^1.0.4
  file_picker: ^5.3.3
  
  # Network Discovery
  multicast_dns: ^0.3.2+2
  
  # Voice (for later)
  # speech_to_text: ^6.6.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
