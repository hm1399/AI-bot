name: ai_bot_app
description: Flutter mobile app for AI-Bot Voice Assistant.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  go_router: ^13.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
