name: ai_bot_network_layer
description: Flutter network layer for AI-Bot project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0  # 用於 WebSocket
  http: ^1.1.0  # 用於 REST API
  dart_ipify: ^1.1.1  # 輔助獲取本地 IP（可選）
  multicast_dns: ^0.3.2  # 用於 mDNS 服務發現（或用 UDP 廣播）
  provider: ^6.1.1  # 假設使用 Provider 狀態管理
  shared_preferences: ^2.2.2  # 用於儲存發現的 URL

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
