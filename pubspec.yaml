name: smart_device_app
description: A Flutter application for controlling smart devices
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.3.6
  web_socket_channel: ^2.4.0
  http: ^0.13.6
  go_router: ^9.0.1
  shared_preferences: ^2.1.0
  uuid: ^3.0.7
  flutter_slidable: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true