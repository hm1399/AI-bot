server:
  host: 0.0.0.0
  port: 8765
  secure: false

nanobot:
  model: x-ai/grok-4.1-fast
  provider: openrouter
  api_key: ${OPENROUTER_API_KEY}
  max_tokens: 8192
  temperature: 0.4
  provider_timeout_seconds: 90
  max_tool_iterations: 20
  memory_window: 50

asr:
  model: FunAudioLLM/SenseVoiceSmall
  language: auto
  device: cpu
  use_vad: true
  use_itn: true

tts:
  voice: en-US-AriaNeural

device:
  auth_token: ${DEVICE_AUTH_TOKEN}

app:
  auth_token: ${APP_AUTH_TOKEN}
  default_session_id: app:main
  settings:
    device_volume: 75
    led_enabled: false
    led_brightness: 50
    led_mode: breathing
    led_color: "#0000ff"
    wake_word: Hey Assistant
    auto_listen: true

storage:
  session_storage_mode: dual
  planning_storage_mode: dual

computer_control:
  enabled: true
  allowed_apps:
    - Safari
    - Finder
    - Google Chrome
    - WeChat
    - WhatsApp
  allowed_shortcuts:
    - daily-brief
  allowed_scripts:
    project-healthcheck:
      command:
        - /bin/echo
        - ok
  allowed_path_roots:
    - ~/Desktop
    - ~/Downloads
  confirm_medium_risk: false
  wechat:
    enabled: false
    experimental_ui: false
    allowed_contacts:
      - 张三

weather:
  api_key: ${OPENWEATHERMAP_API_KEY}
  city: Hong Kong
  units: metric

whatsapp:
  enabled: false
  bridge_url: ws://localhost:3001
  bridge_token: ""
  self_only: true
  allow_from: ["*"]

transport:
  bus:
    inbound_maxsize: 128
    outbound_maxsize: 128
    inbound_reserved_slots: 8
    outbound_reserved_slots: 8
  app_events:
    client_queue_maxsize: 64
  outbound_lanes:
    device_voice_lane: 32
    desktop_voice_lane: 32
    external_channels_lane: 64
    app_realtime_lane: 64

tools:
  restrict_to_workspace: false
  exec:
    timeout: 60
    path_append: ""
  web:
    proxy: ""
    search:
      api_key: ${BRAVE_API_KEY}
  mcp_servers: {}

cron:
  enabled: false
