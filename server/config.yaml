server:
  host: 0.0.0.0
  port: 8765

nanobot:
  model: z-ai/glm-4.7
  provider: openrouter
  api_key: ${OPENROUTER_API_KEY}
  max_tokens: 8192
  temperature: 0.1
  provider_timeout_seconds: 90
  max_tool_iterations: 20
  memory_window: 50

asr:
  model: FunAudioLLM/SenseVoiceSmall
  language: auto
  device: cpu
  use_vad: true
  use_itn: true

tts:
  voice: zh-CN-XiaoxiaoNeural

device:
  auth_token: ${DEVICE_AUTH_TOKEN}

app:
  auth_token: ${APP_AUTH_TOKEN}
  default_session_id: app:main

weather:
  api_key: ${OPENWEATHERMAP_API_KEY}
  city: Hong Kong
  units: metric

whatsapp:
  enabled: true
  bridge_url: ws://localhost:3001
  bridge_token: ""
  self_only: true
  allow_from: ["*"]
